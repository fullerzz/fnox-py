name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      fnox_version:
        description: "Optional upstream fnox version to bundle (defaults to FNOX_VERSION.txt)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest

      - name: Run linting
        run: uv run ruff check src/ tests/

      - name: Run type checking
        run: uv run mypy src/

      - name: Build platform wheels
        run: |
          args=(--output dist/)
          if [ -n "${{ inputs.fnox_version }}" ]; then
            args+=(--fnox-version "${{ inputs.fnox_version }}")
          fi
          uv run python scripts/build_platform_wheel.py "${args[@]}"

      - name: Smoke test — verify wheel contents
        run: |
          for whl in dist/*.whl; do
            echo "--- $whl ---"
            python -m zipfile -l "$whl" | head -20
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish:
    needs: [build, publish-testpypi]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
